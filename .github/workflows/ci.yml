name: CI

on:
  push:
    branches:
      - main
      - security
      - rust-improvements
      - "feature/**"
      - "fix/**"
      - "hotfix/**"
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --manifest-path rust/Cargo.toml --all-targets --all-features -- -D warnings

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        os: [ubuntu-latest]
        include:
          - python-version: "3.14"
            os: macos-latest
          - python-version: "3.14"
            os: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync
      - uses: dtolnay/rust-toolchain@stable
      - run: uv pip install -e rust
      - run: uv run pytest tests/ -q --tb=short --cov --cov-report=xml --cov-report=term-missing
        env:
          PYTHONPATH: rust
      - name: Run Rust accuracy test
        if: matrix.python-version == '3.14' && matrix.os == 'ubuntu-latest'
        run: cargo test --manifest-path rust/Cargo.toml --test test_accury -- --nocapture
      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.14' && matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: chardet/chardet
          fail_ci_if_error: false

  free-threaded:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # PyO3 0.23 currently supports free-threaded up to CPython 3.13t.
        python-version: ["3.13t"]
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync
      - uses: dtolnay/rust-toolchain@stable
      - run: uv pip install -e rust
      - name: Verify GIL is disabled
        run: uv run python -c "import sys; assert not sys._is_gil_enabled(), 'GIL is not disabled'"
        env:
          PYTHONPATH: rust
      - name: Run thread-safety tests
        run: uv run pytest tests/test_thread_safety.py -v -s -W error::pytest.PytestUnhandledThreadExceptionWarning
        env:
          PYTHONPATH: rust
      - name: Run full test suite
        run: uv run pytest tests/ -q --tb=short --cov --cov-report=term-missing
        env:
          PYTHONPATH: rust
